<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Resume Builder</title>
    <link rel="stylesheet" href="css/main.css?v=5">
    <link rel="stylesheet" href="css/preview.css?v=5">
    <!-- All themes loaded - switching done via class names -->
    <link rel="stylesheet" href="css/themes/ats-classic.css?v=5">
    <link rel="stylesheet" href="css/themes/modern.css?v=5">
    <link rel="stylesheet" href="css/themes/minimal.css?v=5">
    <link rel="stylesheet" href="css/themes/creative.css?v=5">
    <link rel="stylesheet" href="css/themes/professional.css?v=5">
    <!-- CodeMirror 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/markdown/markdown.min.js"></script>
    <!-- Marked.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>Markdown Resume Builder</h1>
        <div class="controls">
            <select id="theme-selector" class="theme-select">
                <option value="ats-classic">ATS Classic</option>
                <option value="modern">Modern</option>
                <option value="minimal">Minimal</option>
                <option value="creative">Creative</option>
                <option value="professional">Professional</option>
            </select>
            <button id="export-btn" class="btn-primary">
                <span class="btn-icon-left">📄</span>
                Export PDF
            </button>
        </div>
    </header>

    <main class="split-container">
        <div class="editor-pane">
            <div class="pane-header">
                <span>Markdown</span>
                <div class="editor-actions">
                    <button id="page-break-btn" class="btn-text" title="Insert page break at cursor">⏎ Page Break</button>
                    <button id="clear-btn" class="btn-text">Clear</button>
                </div>
            </div>
            <textarea id="markdown-input"></textarea>
        </div>

        <div class="preview-pane">
            <div class="pane-header">
                <span>Preview (A4)</span>
                <button id="zoom-in" class="btn-icon" title="Zoom In">+</button>
                <button id="zoom-out" class="btn-icon" title="Zoom Out">−</button>
                <button id="zoom-reset" class="btn-icon" title="Reset Zoom">⟲</button>
            </div>
            <div class="preview-container">
                <!-- Pages rendered dynamically here -->
            </div>
        </div>
    </main>

    <script src="js/utils.js?v=5"></script>
    <script src="js/themes.js?v=5"></script>
    <script src="js/preview.js?v=5"></script>
    <script src="js/editor.js?v=5"></script>
    <script src="js/pdf-export.js?v=5"></script>
    <script src="js/app.js?v=5"></script>
</body>
</html>
